name: Build and Deploy to KraftCloud

on:
  workflow_dispatch:
  push:
    branches: [main, feat/proxy-auth-gost]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kraft CLI
        run: |
          curl -sfL https://get.kraftkit.sh | sudo sh
          kraft version

      - name: Authenticate and Deploy
        env:
          UKC_TOKEN: ${{ secrets.UKC_TOKEN }}
        run: |
          DECODED=$(printf '%s' "$UKC_TOKEN" | base64 -d)
          UKC_USER=$(printf '%s' "$DECODED" | cut -d: -f1)
          UKC_PASS=$(printf '%s' "$DECODED" | cut -d: -f2)

          kraft login --user "$UKC_USER" --token "$UKC_PASS" index.unikraft.io
          kraft login --user "$UKC_USER" --token "$UKC_PASS" api.fra0.kraft.cloud

          kraft cloud deploy \
            --metro fra0 \
            --name ${{ github.ref == 'refs/heads/main' && 'abp-unikraft' || 'abp-proxy-test' }} \
            --runtime index.unikraft.io/official/base-compat:latest \
            --scale-to-zero idle \
            --scale-to-zero-stateful \
            --scale-to-zero-cooldown 5s \
            --compress \
            --restart on-failure \
            -p 443:15678 \
            -M 4096 \
            --no-prompt \
            .
