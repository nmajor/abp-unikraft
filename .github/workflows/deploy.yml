name: Build and Deploy to KraftCloud

on:
  workflow_dispatch:
  push:
    branches: [main, feat/proxy-auth-gost]

# Disable OIDC token to prevent kraft from auto-discovering GH Actions auth
permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kraft CLI
        run: |
          KRAFT_VERSION="0.12.7"
          wget -q "https://github.com/unikraft/kraftkit/releases/download/v${KRAFT_VERSION}/kraftkit_${KRAFT_VERSION}_linux_amd64.deb" \
            -O /tmp/kraftkit.deb
          sudo dpkg -i /tmp/kraftkit.deb
          kraft version

      - name: Authenticate and Deploy
        env:
          UKC_TOKEN: ${{ secrets.UKC_TOKEN }}
        run: |
          DECODED=$(printf '%s' "$UKC_TOKEN" | base64 -d)
          UKC_USER=$(printf '%s' "$DECODED" | cut -d: -f1)
          UKC_PASS=$(printf '%s' "$DECODED" | cut -d: -f2)

          kraft login --user "$UKC_USER" --token "$UKC_PASS" index.unikraft.io
          kraft login --user "$UKC_USER" --token "$UKC_PASS" api.fra.unikraft.cloud

          kraft cloud deploy \
            --token "$UKC_TOKEN" \
            --metro fra \
            --name ${{ github.ref == 'refs/heads/main' && 'abp-unikraft' || 'abp-proxy-test' }} \
            --runtime index.unikraft.io/official/base-compat:latest \
            --scale-to-zero idle \
            --scale-to-zero-stateful \
            --scale-to-zero-cooldown 5s \
            --compress \
            --restart on-failure \
            -p 443:15678 \
            -M 4096 \
            --no-prompt \
            .
