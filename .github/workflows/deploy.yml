name: Build and Deploy to KraftCloud

on:
  workflow_dispatch:
  push:
    branches: [main, feat/proxy-auth-gost]

env:
  KRAFT_VERSION: "0.12.6-26-gd96d6411"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kraft CLI
        run: |
          wget -q "https://github.com/unikraft/kraftkit/releases/download/v${KRAFT_VERSION}/kraftkit_${KRAFT_VERSION}_linux_amd64.deb" \
            -O /tmp/kraftkit.deb
          sudo dpkg -i /tmp/kraftkit.deb
          kraft version

      - name: Authenticate to KraftCloud
        env:
          UKC_TOKEN: ${{ secrets.UKC_TOKEN }}
        run: |
          # Extract user and token from base64-encoded UKC_TOKEN
          DECODED=$(echo "$UKC_TOKEN" | base64 -d)
          UKC_USER=$(echo "$DECODED" | cut -d: -f1)
          UKC_PASS=$(echo "$DECODED" | cut -d: -f2)
          # Set up kraft config for both API and registry
          mkdir -p ~/.config/kraftkit
          cat > ~/.config/kraftkit/config.yaml << KRAFTEOF
          no_prompt: true
          auth:
            api.fra0.kraft.cloud:
              user: "${UKC_USER}"
              token: "${UKC_PASS}"
              endpoint: api.fra0.kraft.cloud
              verify_ssl: true
            index.unikraft.io:
              user: "${UKC_USER}"
              token: "${UKC_PASS}"
              endpoint: index.unikraft.io
              verify_ssl: true
          KRAFTEOF

      - name: Deploy to KraftCloud
        env:
          UKC_TOKEN: ${{ secrets.UKC_TOKEN }}
          UKC_METRO: fra0
        run: |
          kraft cloud deploy \
            --token "${UKC_TOKEN}" \
            --metro fra0 \
            --name ${{ github.ref == 'refs/heads/main' && 'abp-unikraft' || 'abp-proxy-test' }} \
            --runtime index.unikraft.io/official/base-compat:latest \
            --scale-to-zero idle \
            --scale-to-zero-stateful \
            --scale-to-zero-cooldown 5s \
            --compress \
            --restart on-failure \
            -p 443:15678 \
            -M 4096 \
            --no-prompt \
            .
